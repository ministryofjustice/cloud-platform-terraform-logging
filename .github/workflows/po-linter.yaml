name: Prometheus Operator Linter

on:
  pull_request:
    paths:
    - resources/prometheusrule-alerts/*
  workflow_dispatch:

jobs:
  po-lint:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Prometheus Operator Linter
        uses: prymitive/pint-action@7ba9dbf73e069fe81c90ff1fd55faecf3c14af40 # v1.102.0
        with:
          token: ${{ github.token }}